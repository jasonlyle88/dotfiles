[cmd_duration]
style="bg:yellow fg:black"
format = '[о‚І](bg:prev_bg fg:yellow)[ $duration п‰’ ]($style)'

[directory]
style = "bold white"
read_only_style = "bold red"
format = "[о‚°](fg:prev_bg bg:blue)[ [$path]($style bg:blue)[$read_only]($read_only_style bg:blue) ](bg:blue)[о‚°](fg:blue)"

[fill]
symbol = 'вЂ’'
