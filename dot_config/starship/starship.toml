###
### Global configuration
###

format = """
$os\
$all\
$fill\
$status\
$cmd_duration\
$time\
${custom.date}\
$line_break\
$character\
"""

# Adds a newline between shell prompts
add_newline = false

# Character to show when the command takes more than one line
continuation_prompt = '[>](bright-green) '

###
